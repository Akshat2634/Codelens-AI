name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Publish codelens-ai to npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "codelens-ai@$PKG_VERSION" version 2>/dev/null; then
            echo "::warning::Version $PKG_VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
