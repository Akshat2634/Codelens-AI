name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Publish codelens-ai to npm
        run: npm publish --provenance --access public

      - name: Publish claude-roi alias to npm
        run: |
          npm pkg set name=claude-roi
          npm publish --access public
          npm pkg set name=codelens-ai

      - name: Deprecate claude-roi on npm
        run: |
          sleep 10
          npm deprecate claude-roi "Renamed to codelens-ai. Use: npx codelens-ai"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
