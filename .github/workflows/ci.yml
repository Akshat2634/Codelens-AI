name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint (Biome)
        run: npm run lint

      - name: Syntax check all source files
        run: |
          for f in src/*.js; do
            node --check "$f"
          done

      - name: Unit tests
        run: npm run test:unit

      - name: Verify CLI starts without error
        run: node src/index.js --json --claude-dir tests/fixtures/claude-projects --codex-dir tests/fixtures/codex-sessions --days 30 > /dev/null

  package:
    # Production-fidelity guard: pack the tarball, install it with prod deps
    # only (chart.js is a devDependency, so absent — exactly like `npx`), boot
    # the CLI, and assert the dashboard + vendored Chart.js bundle serve. This
    # catches the v0.8.20 class of failure (blank dashboard from a missing
    # /vendor asset) that never showed up when testing against the source tree.
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package smoke test (pack, clean-install, serve)
        run: npm run test:package

  e2e:
    # Run Playwright smoke suite only once per PR (not across every Node version)
    # against fixture-backed sessions. Full dashboard coverage lives in
    # tests/local/ and is run manually with `npm run test:e2e:local`.
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke E2E (fixtures)
        env:
          CI: "1"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
