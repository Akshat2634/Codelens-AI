<script>
  // Resolve the saved theme before first paint so there is no dark→light flash.
  (function () {
    try {
      var t = localStorage.getItem('codelens-mc-theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) { /* storage blocked — fall back to the dark default */ }
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.setAttribute('data-motion', 'off');
    }
  })();

<style>
  /* ── Design tokens — warm-ink instrument panel (dark) / warm-paper ledger (light) ── */
  :root {
    color-scheme: dark;
    --bg: #0B0A08; --bg2: #100F0C; --card: #161411; --card2: #1B1815; --hover: #221E17;
    --line: #2A251D; --line2: #211D16;
    --ink: #F4F1EA; --ink2: #A9A296; --ink3: #746D60;
    --amber: #C4840B; --amber-hi: #E8A93C; --green: #2E9E4F; --red: #E66767;
    --blue: #3987E5; --purple: #9085E9; --cyan: #1FA97C; --pink: #D55181;
    --grade-a: #2E9E4F; --grade-b: #3987E5; --grade-c: #C4840B; --grade-d: #D95926; --grade-f: #E66767;
    --glass: rgba(22, 20, 17, 0.78); --glass-line: rgba(244, 241, 234, 0.08);
    --accent: #C4840B;
    --shadow: 0 18px 44px -18px rgba(0, 0, 0, 0.55);
    --grid-line: rgba(242, 239, 232, 0.045);
    --scrim: rgba(6, 5, 4, 0.62);
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg: #F6F4EF; --bg2: #F0EDE6; --card: #FDFCFA; --card2: #F3F0E9; --hover: #EAE6DC;
    --line: #D9D3C6; --line2: #E8E3D8;
    --ink: #1B1811; --ink2: #59534A; --ink3: #8B8375;
    --amber: #B57603; --amber-hi: #A56A00; --green: #20813C; --red: #D64444;
    --blue: #2A78D6; --purple: #5D50C9; --cyan: #14936B; --pink: #C74A74;
    --grade-a: #20813C; --grade-b: #2A78D6; --grade-c: #B57603; --grade-d: #C24E1D; --grade-f: #D64444;
    --glass: rgba(253, 252, 250, 0.85); --glass-line: rgba(27, 24, 17, 0.09);
    --shadow: 0 18px 40px -20px rgba(63, 55, 40, 0.28);
    --grid-line: rgba(27, 24, 17, 0.035);
    --scrim: rgba(38, 33, 24, 0.35);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; min-height: 100vh; background:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      radial-gradient(ellipse 90% 55% at 50% -12%, color-mix(in srgb, var(--accent) 11%, transparent), transparent 62%),
      var(--bg);
    background-size: 48px 48px, 48px 48px, auto, auto;
    color: var(--ink);
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html.theme-flip body, html.theme-flip * { transition: background 0.35s, background-color 0.35s, border-color 0.35s, color 0.35s; }
  a { color: inherit; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }
  * { scrollbar-color: var(--line) transparent; scrollbar-width: thin; }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes riseSm { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes growX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes ringIn { from { stroke-dashoffset: var(--c); } to { stroke-dashoffset: var(--o); } }

  @keyframes themeReveal {
    from { clip-path: circle(0px at var(--vt-x, 50%) var(--vt-y, 50%)); }
    to { clip-path: circle(160% at var(--vt-x, 50%) var(--vt-y, 50%)); }
  }

  /* ── Layout scaffold ── */
  .app { min-height: 100vh; display: flex; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 236px; z-index: 60;
    display: flex; flex-direction: column; gap: 4px; padding: 22px 14px 16px;
    border-right: 1px solid var(--line2); background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
  }
  .main { flex: 1; margin-left: 236px; min-width: 0; }
  .main-inner { max-width: 1200px; margin: 0 auto; padding: 26px 38px 80px; }
  .card-hover { transition: border-color 0.25s, transform 0.25s; }

  /* ── Hover affordances (ported from the prototype's style-hover states).
       Inline styles win over class selectors, so overrides that touch an
       inline property use !important. ── */
  .source-tab:not(.active):not([disabled]):hover { border-color: var(--glass-line) !important; color: var(--ink) !important; }
  .nav-item:hover { background: var(--hover) !important; color: var(--ink) !important; }
  [data-act="openCmd"]:hover,
  [data-act="toggleTheme"]:hover,
  [data-act="toggleLog"]:hover,
  [data-act="toggleBurn"]:hover,
  [data-act="prevPage"]:hover,
  [data-act="nextPage"]:hover,
  [data-act="openShare"]:hover,
  [data-act="openCli"]:hover,
  [data-act="refreshData"]:not([disabled]):hover { border-color: var(--glass-line) !important; color: var(--ink) !important; }
  [data-act="sort"]:not([disabled]):hover,
  [data-act="range"]:hover,
  [data-act="filter"]:hover { color: var(--ink) !important; }
  .insight { transition: border-color 0.2s; }
  .insight:hover { border-color: var(--glass-line) !important; }
  .session-row { transition: background 0.15s; }
  .session-row:not(.expanded):hover { background: var(--hover) !important; }
  .heat-cell { transition: transform 0.12s, box-shadow 0.12s; }
  .heat-cell:hover { transform: scale(1.35); box-shadow: 0 0 0 1px var(--glass-line), 0 4px 10px rgba(0, 0, 0, 0.35); position: relative; z-index: 2; }
  .share-close:hover { color: var(--ink) !important; background: var(--hover) !important; }
  .share-copy:hover { filter: brightness(1.08); }
  .cli-close:hover { color: var(--ink) !important; background: var(--hover) !important; }
  .cli-row { transition: border-color 0.15s; }
  .cli-row:hover { border-color: var(--glass-line) !important; }
  .cli-copy:hover { border-color: var(--glass-line) !important; color: var(--ink) !important; background: var(--hover) !important; }
  .share-download:hover { border-color: var(--glass-line) !important; background: var(--hover) !important; }
  .footer-link:hover { text-decoration: underline !important; color: var(--cyan) !important; }

  /* ── Responsive: collapse the fixed rail into a stacked header on narrow viewports ── */
  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar {
      position: static; width: auto; flex-direction: column;
      border-right: 0; border-bottom: 1px solid var(--line2);
      backdrop-filter: none; -webkit-backdrop-filter: none;
    }
    .sidebar .rail-spacer { display: none; }
    .main { margin-left: 0; }
    .main-inner { padding: 20px 18px 64px; }
  }
</style>

  // ── Number tickers ──

        if (!isFinite(target)) return;
        const t0 = performance.now();
        const dur = motionOn() ? 1000 : 1;
        const step = (t) => {
          const p = Math.min((t - t0) / dur, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          const cur = target * eased;
          el.textContent = fmt === 'money' ? '$' + cur.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })

  // ── Refresh — a real POST to /api/refresh (re-parses sessions server-side),
  // then re-fetches every source so the dashboard reflects the new data. ──
  async function refreshData() {
    if (state.refreshing) return;
    state.refreshing = true;
    renderTopbar();
    try {
      const res = await fetch('/api/refresh', { method: 'POST' });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `Refresh failed (${res.status})`);
      const [all, claude, codex] = await Promise.all([fetchPayload('all'), fetchPayload('claude'), fetchPayload('codex')]);
      if (all && all.meta) {
        payloads.all = all;
        payloads.claude = (claude && claude.meta && claude.meta.source === 'claude') ? claude : null;
        payloads.codex = (codex && codex.meta && codex.meta.source === 'codex') ? codex : null;
        if (state.source !== 'all' && !payloads[state.source]) state.source = 'all';
        state.expanded = null; state.page = 1;

    }
  }

  // ── Share report card — draws a self-contained canvas summary (grade,
  // headline stats, efficiency bars, heatmap, top insights) for copy/download. ──
  function srcTitle() {

  }
  function openShare() {
    state.shareOpen = true; state.shareTheme = state.theme;
    renderShare();
    (document.fonts ? document.fonts.ready : Promise.resolve()).then(() => drawShareCard());
  }
  function closeShare() { state.shareOpen = false; renderShare(); }

  function drawShareCard() {

    const v = view();

    const isLight = state.shareTheme === 'light';
    const th = isLight
      ? { bg1: '#F6F4EF', bg2: '#FDFCFA', border: 'rgba(27,24,17,0.14)', ink: '#1B1811', ink2: '#59534A', ink3: '#8B8375', dim: '#8B8375', track: '#EAE6DC', box: 'rgba(27,24,17,0.03)', sep: '#D9D3C6', orb: 'rgba(181,118,3,0.08)' }

      cTeal = isLight ? '#14936B' : '#1FA97C', cRed = isLight ? '#D64444' : '#E66767';
    const gradeHex = { A: cGreen, B: cBlue, C: cOrange, D: isLight ? '#C24E1D' : '#D95926', F: cRed };
    const s = v.summary, t = v.tokenAnalytics, ls = v.lineSurvival;
    const W = 600, ctx = canvas.getContext('2d');
    const mono = (w) => `${w} 10px 'IBM Plex Mono', monospace`;

    const LINE_H = 14;
    ctx.font = "400 11px 'Instrument Sans', sans-serif";
    const wrap = (text, maxW) => {
      const words = String(text).split(' '), lines = [];
      let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (ctx.measureText(cand).width > maxW && cur) { lines.push(cur); cur = w; }
        else cur = cand;
      }
      if (cur) lines.push(cur);
      return lines.slice(0, 3);
    };
    const topInsights = (v.insights || []).slice(0, 3);
    const insightLines = topInsights.map((i) => wrap(i.text, W - 64 - 26));
    const insightsH = topInsights.length ? 26 + insightLines.reduce((a, l) => a + l.length * LINE_H + 12, 0) : 0;
    const heatH = 7 * 12;
    const H = 136 + 20 + 116 + 24 + 18 + 34 * 3 + 34 + 16 + heatH + insightsH + 62;

    canvas.width = W * 2; canvas.height = H * 2;
    canvas.style.width = '100%'; canvas.style.height = 'auto'; canvas.style.display = 'block';
    ctx.setTransform(2, 0, 0, 2, 0, 0);

    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, th.bg1); g.addColorStop(0.5, th.bg2); g.addColorStop(1, th.bg1);

  function tzInfo() {
    let tz = '';
    try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; } catch (e) { /* unsupported */ }
    const city = tz.includes('/') ? tz.split('/').pop().replace(/_/g, ' ') : (tz || 'Local time');
    const now = new Date();
    const partsOf = (opts) => {
      try { return new Intl.DateTimeFormat('en-US', { timeZone: tz || undefined, ...opts }).formatToParts(now); }
      catch (e) { return []; }
    };
    let offset = (partsOf({ timeZoneName: 'longOffset' }).find((p) => p.type === 'timeZoneName') || {}).value || '';
    offset = offset.replace('GMT', 'UTC');
    if (!offset) {
      const mins = -now.getTimezoneOffset();
      const sign = mins < 0 ? '-' : '+';
      const abs = Math.abs(mins);
      offset = 'UTC' + sign + String(Math.floor(abs / 60)).padStart(2, '0') + ':' + String(abs % 60).padStart(2, '0');
    }
    offset = offset.replace(/^UTC([+-])(\d{2}):(\d{2})$/, (_, s, h, m) => 'UTC' + s + parseInt(h, 10) + (m === '00' ? '' : ':' + m));
    let abbr = (partsOf({ timeZoneName: 'short' }).find((p) => p.type === 'timeZoneName') || {}).value || '';
    if (/^(GMT|UTC)([+-]\d{1,2}(:\d{2})?)?$/i.test(abbr)) abbr = '';
    return { city, tz, abbr, offset };
  }

      <span title="${esc(tzTitle)}" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:0.04em;color:var(--ink3);border:1px solid var(--line2);background:var(--card);border-radius:7px;padding:5px 11px;">${esc(tzVisible)}</span>
      <button data-act="openCli" title="CLI commands" style="display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--card);color:var(--ink2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:6px 12px;border-radius:7px;transition:color .2s,border-color .2s;">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        CLI
      </button>
      <button id="share-btn" data-act="openShare" title="Share AI Report Card" style="display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--card);color:var(--ink2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:6px 12px;border-radius:7px;transition:color .2s,border-color .2s;">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        Share
      </button>
      <button id="refresh-btn" data-act="refreshData" title="Refresh dashboard data" ${state.refreshing ? 'disabled' : ''} style="display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line2);background:var(--card);color:var(--ink2);cursor:${state.refreshing ? 'default' : 'pointer'};opacity:${state.refreshing ? 0.6 : 1};padding:6px 9px;border-radius:7px;transition:color .2s,border-color .2s;">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:${state.refreshing ? 'spinCw 0.8s linear infinite' : 'none'};"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>`;
  }

  function renderOverview() {
    const v = view();
    const sum = v.summary, tk = v.tokenAnalytics;

    // Weekly briefing
    const n = v.weeklyNarrative || { headline: '', metrics: [] };
    let narrativeLead = n.headline, verdictText = '', verdictColor = 'var(--ink2)', verdictBg = 'var(--hover)';
    const vm = n.headline.match(/(\d+% (?:pricier|cheaper) than last week|on par with last week)\.?$/);
    if (vm) {
      narrativeLead = n.headline.slice(0, vm.index).replace(/[—-]\s*(each one\s*)?$/, '').trim();
      verdictText = vm[1];
      const bad = vm[1].includes('pricier');
      const flat = vm[1].includes('on par');
      verdictColor = flat ? 'var(--ink2)' : bad ? 'var(--red)' : 'var(--green)';
      verdictBg = flat ? 'var(--hover)' : `color-mix(in srgb, ${bad ? 'var(--red)' : 'var(--green)'} 13%, transparent)`;
    }
    const narrativeMetrics = (n.metrics || []).map((m) => {
      const has = m.deltaPct !== null && m.deltaPct !== undefined;
      const flat = has && Math.abs(m.deltaPct) < 2;
      const better = has && (m.direction === 'higher-better' ? m.deltaPct > 0 : m.deltaPct < 0);
      const col = !has || flat ? 'var(--ink3)' : better ? 'var(--green)' : 'var(--red)';
      const deltaText = !has ? '— new' : `${flat ? '•' : m.deltaPct > 0 ? '▲' : '▼'} ${m.deltaPct > 0 ? '+' : ''}${m.deltaPct}% vs last wk`;
      return `<div class="narrative-metric" style="border:1px solid var(--line2);border-radius:11px;background:color-mix(in srgb, var(--bg) 42%, transparent);padding:12px 14px;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);">${esc(m.label)}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:700;margin-top:5px;">${esc(m.value)}</div>
        <div style="display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:6px;color:${col};background:color-mix(in srgb, ${col} 12%, transparent);">${esc(deltaText)}</div>
      </div>`;
    }).join('');

    const briefing = `<div class="narrative" style="border:1px solid var(--line2);border-radius:16px;background:linear-gradient(160deg, color-mix(in srgb, var(--accent) 7%, var(--card)), var(--card) 55%);padding:24px 28px;box-shadow:var(--shadow);animation:rise .6s cubic-bezier(0.22,1,0.36,1) both;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%);"></div>
      <div class="narrative-kicker" style="display:flex;align-items:center;gap:9px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--accent);">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blinkDot 2.2s infinite;"></span>
        Weekly Briefing
      </div>
      <div class="narrative-headline" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(20px,2.6vw,27px);letter-spacing:-0.02em;line-height:1.32;margin-top:10px;max-width:860px;text-wrap:pretty;">
        ${esc(narrativeLead)}${verdictText ? ` <span style="display:inline-block;padding:1px 12px;border-radius:8px;background:${verdictBg};color:${verdictColor};white-space:nowrap;">${esc(verdictText)}</span>` : ''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:20px;">${narrativeMetrics}</div>
    </div>`;

    // Score card
    const es = sum.efficiencyScore || { score: 0, letter: 'F', tier: '—', explanation: '', tip: '' };
    const scoreColor = scoreColorOf(es.score);
    const C = 452.4;
    const scoreOffset = (C - C * es.score / 100).toFixed(1);
    const scoreGlow = `color-mix(in srgb, ${scoreColor} 22%, transparent)`;
    const scoreCard = `<div style="flex:1 1 300px;border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:26px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:var(--shadow);animation:rise .6s .06s cubic-bezier(0.22,1,0.36,1) both;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:-40% -40% auto;height:70%;background:radial-gradient(ellipse at 50% 0%, ${scoreGlow}, transparent 65%);pointer-events:none;"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);">Efficiency Score</div>
      <div style="position:relative;width:168px;height:168px;margin-top:18px;">
        <svg viewBox="0 0 168 168" width="168" height="168" style="transform:rotate(-90deg);">
          <circle cx="84" cy="84" r="72" fill="none" stroke="var(--hover)" stroke-width="10"></circle>
          <circle cx="84" cy="84" r="72" fill="none" stroke="${scoreColor}" stroke-width="10" stroke-linecap="round" stroke-dasharray="452.4" stroke-dashoffset="${scoreOffset}" style="--c:452.4;--o:${scoreOffset};animation:ringIn 1.3s .3s cubic-bezier(0.22,1,0.36,1) both;filter:drop-shadow(0 0 10px ${scoreGlow});"></circle>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;">
          <span class="score-value" style="font-family:'IBM Plex Mono',monospace;font-size:46px;font-weight:700;line-height:1;color:${scoreColor};">${es.score}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.18em;color:var(--ink3);">/ 100 · GRADE ${esc(es.letter)}</span>
        </div>
      </div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;color:${scoreColor};margin-top:16px;">${esc(es.tier)}</div>
      <div style="font-size:12.5px;color:var(--ink2);line-height:1.55;margin-top:6px;text-wrap:pretty;">${esc(es.explanation)}</div>
      <div style="margin-top:12px;font-size:11.5px;color:var(--ink3);border:1px dashed var(--line);border-radius:9px;padding:8px 12px;line-height:1.5;">${esc(es.tip)}</div>
    </div>`;

    // Stat tiles
    const daily14 = v.daily.slice(-14);
    const costSpark = sparkPaths(daily14.map((d) => d.cost));
    const lineSpark = sparkPaths(daily14.map((d) => d.linesAdded));
    const leak = sum.valueLeak || { cost: 0, pct: 0, sessionCount: 0 };
    const leakColor = leak.pct >= 40 ? 'var(--red)' : leak.pct >= 15 ? 'var(--amber-hi)' : 'var(--green)';
    const tiles = [
      { cls: 'cost-card', label: 'Agent Spend', value: fmtMoney(sum.totalCost), tick: ['money', (sum.totalCost || 0).toFixed(2)], unit: 'API-equiv', sub: `${sum.totalSessions} sessions this window`, color: 'var(--amber-hi)', hoverLine: 'color-mix(in srgb, var(--amber) 45%, transparent)', spark: costSpark, sparkFill: 'color-mix(in srgb, var(--amber) 12%, transparent)', delay: '0.1s' },
      { label: 'Commits Shipped', value: String(sum.totalCommits), tick: ['int', sum.totalCommits], unit: 'commits', sub: `${sum.totalLinesAdded.toLocaleString()} lines added`, color: 'var(--green)', hoverLine: 'color-mix(in srgb, var(--green) 45%, transparent)', spark: lineSpark, sparkFill: 'color-mix(in srgb, var(--green) 12%, transparent)', delay: '0.16s' },
      { label: 'Cost per Commit', value: fmtMoney(sum.avgCostPerCommit), tick: ['money', (sum.avgCostPerCommit || 0).toFixed(2)], unit: 'avg', sub: `${sum.totalFilesChanged} files changed`, color: 'var(--blue)', hoverLine: 'color-mix(in srgb, var(--blue) 45%, transparent)', bar: Math.min(100, (sum.avgCostPerCommit || 0) / 5 * 100).toFixed(0) + '%', barLo: '$0', barHi: '$5+', delay: '0.22s' },
      { label: 'AI Code Share', value: (sum.aiCodeSharePct ?? '—') + '%', unit: 'of merged lines', sub: 'measured from git history', color: 'var(--purple)', hoverLine: 'color-mix(in srgb, var(--purple) 45%, transparent)', bar: (sum.aiCodeSharePct || 0) + '%', barLo: '0%', barHi: '100%', delay: '0.28s' },
      { label: 'Value Leak', value: fmtMoney(leak.cost), tick: ['money', (leak.cost || 0).toFixed(2)], unit: leak.pct + '% of spend', sub: `${leak.sessionCount} sessions shipped nothing`, color: leakColor, hoverLine: `color-mix(in srgb, ${leakColor} 45%, transparent)`, bar: leak.pct + '%', barLo: '0%', barHi: '100%', delay: '0.34s' },
      { label: 'Token Efficiency', value: tk.tokenEfficiencyRate + '%', unit: 'shipped code', sub: `${fmtTokens(tk.totalAllTokens)} tokens burned`, color: 'var(--cyan)', hoverLine: 'color-mix(in srgb, var(--cyan) 45%, transparent)', bar: tk.tokenEfficiencyRate + '%', barLo: '0%', barHi: '100%', delay: '0.4s' },
    ];
    const statTiles = tiles.map((st) => {
      const valSpan = st.tick
        ? `<span class="stat-value value tick" data-fmt="${st.tick[0]}" data-target="${st.tick[1]}" style="font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:700;letter-spacing:-0.02em;color:${st.color};">${esc(st.value)}</span>`
        : `<span class="stat-value value" style="font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:700;letter-spacing:-0.02em;color:${st.color};">${esc(st.value)}</span>`;
      const chart = st.spark
        ? `<svg viewBox="0 0 100 30" preserveAspectRatio="none" style="width:100%;height:30px;margin-top:10px;display:block;">
            <path d="${st.spark.area}" fill="${st.sparkFill}" stroke="none"></path>
            <path d="${st.spark.line}" fill="none" stroke="${st.color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" stroke-dasharray="300" style="animation:drawLine 1.4s .35s cubic-bezier(0.4,0,0.2,1) both;"></path>
          </svg>`
        : `<div style="height:6px;border-radius:4px;background:var(--hover);margin-top:12px;overflow:hidden;">
            <div style="height:100%;width:${st.bar};border-radius:4px;background:${st.color};transform-origin:left;animation:growX 1.1s .4s cubic-bezier(0.22,1,0.36,1) both;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);margin-top:5px;"><span>${esc(st.barLo)}</span><span>${esc(st.barHi)}</span></div>`;
      return `<div class="stat-card card-hover${st.cls ? ' ' + st.cls : ''}" data-hoverline="${st.hoverLine}" style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:18px 20px 16px;display:flex;flex-direction:column;box-shadow:var(--shadow);animation:rise .6s cubic-bezier(0.22,1,0.36,1) both;animation-delay:${st.delay};position:relative;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:8px;height:8px;border-radius:3px;background:${st.color};"></span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink3);">${esc(st.label)}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:6px;margin-top:10px;">
          ${valSpan}
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--ink3);">${esc(st.unit)}</span>
        </div>
        <div style="font-size:11.5px;color:var(--ink2);margin-top:4px;">${esc(st.sub)}</div>
        <div style="flex:1;"></div>
        ${chart}
      </div>`;
    }).join('');

    const heroBento = `<div class="hero-stats" style="display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;align-items:stretch;">
      ${scoreCard}
      <div style="flex:3 1 540px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));grid-auto-rows:1fr;gap:14px;">${statTiles}</div>
    </div>`;

    // Period strip
    const p = sum.costByPeriod;
    const periodDefs = [
      ['Today', p.today, 'var(--green)', '0.15s'],
      ['Last 7 days', p.week, 'var(--blue)', '0.2s'],
      ['This month', p.month, 'var(--purple)', '0.25s'],
      ['Full window', p.allTime, 'var(--amber)', '0.3s'],
    ];
    const periodStrip = `<div class="roi-headlines" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-top:14px;overflow:visible;">${periodDefs.map(([label, d, top, delay]) => `
      <div style="border:1px solid var(--line2);border-radius:13px;background:var(--card);padding:14px 17px;animation:riseSm .55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:${delay};border-top:2px solid ${top};">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink3);">${esc(label)}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:700;margin-top:6px;">${esc(fmtMoney(d.cost))}</div>
        <div style="font-size:11px;color:var(--ink2);margin-top:3px;">${d.sessions} sessions · ${d.commits} commits</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);margin-top:2px;">${esc(fmtTokens(d.tokens))} tokens</div>
      </div>`).join('')}</div>`;

    // Insights feed
    const iMeta = { warning: ['!', 'var(--amber-hi)'], success: ['+', 'var(--green)'], info: ['i', 'var(--blue)'], tip: ['*', 'var(--purple)'] };
    const insights = (v.insights || []).slice(0, 8).map((it, idx) => {
      const [icon, color] = iMeta[it.type] || iMeta.info;
      const delay = (0.2 + idx * 0.06).toFixed(2) + 's';
      return `<div class="insight" style="display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line2);border-radius:12px;background:var(--card);padding:13px 16px;animation:riseSm .55s cubic-bezier(0.22,1,0.36,1) both;animation-delay:${delay};">
        <span style="flex-shrink:0;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:${color};background:color-mix(in srgb, ${color} 13%, transparent);margin-top:1px;">${icon}</span>
        <span style="font-size:12.5px;line-height:1.6;color:var(--ink2);text-wrap:pretty;">${esc(it.text)}</span>
      </div>`;
    }).join('');
    const insightFeed = `<div class="insight-list" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;margin-top:14px;">${insights}</div>`;

    $('sec-overview').innerHTML = briefing + heroBento + periodStrip + insightFeed;
  }

  function renderFlow() {
    const v = view();
    const tk = v.tokenAnalytics;
    const f = tk.funnel;
    const pct1 = (x) => (x / (f.total || 1) * 100);
    const fmtP = (x) => { const raw = pct1(x); return raw > 0 && raw < 0.1 ? '<0.1%' : raw.toFixed(1) + '%'; };
    const typeDefs = [
      ['Input', f.input, 'var(--blue)'], ['Output', f.output, 'var(--purple)'],
      ['Cache Read', f.cacheRead, 'var(--cyan)'],
    ].concat(f.cacheCreation > 0 ? [['Cache Write', f.cacheCreation, 'var(--amber)']] : []);
    const funnelType = typeDefs.map(([label, val, color]) =>
      `<div title="${esc(label)}: ${esc(fmtTokens(val))}" style="width:${Math.max(pct1(val), 0.6).toFixed(2)}%;background:${color};display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.92);transform-origin:left;animation:growX .9s .25s cubic-bezier(0.22,1,0.36,1) both;min-width:3px;">${pct1(val) > 12 ? esc(fmtP(val)) : ''}</div>`).join('');
    const funnelTypeLegend = typeDefs.map(([label, val, color]) =>
      `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2);"><span style="width:8px;height:8px;border-radius:3px;background:${color};"></span>${esc(label)} ${esc(fmtTokens(val))} (${esc(fmtP(val))})</span>`).join('');
    const outDefs = [
      ['Productive', f.productive, 'var(--green)', 'led to commits'],
      ['Exploratory', f.exploratory, 'color-mix(in srgb, var(--blue) 45%, var(--hover))', 'short, no commits'],
      ['Wasted', f.orphaned, 'var(--red)', 'long, zero output'],
    ];
    const funnelOut = outDefs.map(([label, val, color, note]) =>
      `<div title="${esc(label)}: ${esc(fmtTokens(val))} — ${esc(note)}" style="width:${Math.max(pct1(val), 0.6).toFixed(2)}%;background:${color};display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.92);transform-origin:left;animation:growX .9s .4s cubic-bezier(0.22,1,0.36,1) both;min-width:3px;">${pct1(val) > 14 ? esc(fmtP(val)) : ''}</div>`).join('');
    const funnelOutLegend = outDefs.map(([label, val, color, note]) =>
      `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2);"><span style="width:8px;height:8px;border-radius:3px;background:${color};"></span>${esc(label)} (${esc(fmtP(val))}) — ${esc(note)}</span>`).join('');

    const rangeChips = [7, 14, 30].map((r) =>
      `<button data-act="range" data-arg="${r}" style="border:0;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.06em;padding:5px 12px;border-radius:7px;color:${state.range === r ? 'var(--ink)' : 'var(--ink3)'};background:${state.range === r ? 'var(--hover)' : 'transparent'};transition:color .15s,background .15s;">${r}D</button>`).join('');

    $('sec-flow').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--accent);">02</span>
        <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;">Cost &amp; Token Flow</h2>
        <div style="flex:1;height:1px;background:var(--line2);min-width:20px;"></div>
        <div style="display:flex;gap:4px;border:1px solid var(--line2);border-radius:9px;padding:3px;background:var(--card);">${rangeChips}</div>
      </div>
      <div style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Cost vs Output</h3>
          <span style="font-size:11px;color:var(--ink3);">amber $ / green lines shipped</span>
          <div style="flex:1;"></div>
          <button data-act="toggleLog" style="border:1px solid var(--line2);background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;padding:5px 11px;border-radius:7px;">${state.timelineLog ? 'Linear scale' : 'Log scale'}</button>
        </div>
        <div style="height:320px;margin-top:14px;position:relative;"><canvas id="chart-timeline"></canvas></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;">
        <div style="flex:4 1 380px;min-width:0;border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);">
          <div style="display:flex;align-items:center;gap:10px;">
            <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Token Burn Rate</h3>
            <div style="flex:1;"></div>
            <button data-act="toggleBurn" style="border:1px solid var(--line2);background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.06em;padding:5px 11px;border-radius:7px;">${state.burnSplit ? 'Stacked' : 'Split view'}</button>
          </div>
          <div style="height:260px;margin-top:14px;position:relative;"><canvas id="chart-token-burn"></canvas></div>
        </div>
        <div style="flex:3 1 330px;min-width:0;border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;">
          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Where Tokens Went</h3>
          <div>
            <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);margin-bottom:7px;"><span>BY TYPE</span><span>${esc(fmtTokens(f.total))} total</span></div>
            <div style="display:flex;height:30px;border-radius:8px;overflow:hidden;gap:2px;">${funnelType}</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:9px;">${funnelTypeLegend}</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);margin-bottom:7px;"><span>BY OUTCOME</span><span style="color:var(--green);">${esc(pct1(f.productive).toFixed(1))}% productive</span></div>
            <div style="display:flex;height:30px;border-radius:8px;overflow:hidden;gap:2px;">${funnelOut}</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:9px;">${funnelOutLegend}</div>
          </div>
          <div style="border-top:1px dashed var(--line);padding-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);">Cache hit rate</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--cyan);margin-top:4px;">${tk.cacheHitRate}%</div>
              <div style="font-size:11px;color:var(--ink2);margin-top:2px;">$${tk.cacheSavingsDollars.toFixed(0)} saved vs uncached</div>
            </div>
            <div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);">Tokens / commit</div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--purple);margin-top:4px;">${esc(fmtTokens(tk.tokensPerCommit))}</div>
              <div style="font-size:11px;color:var(--ink2);margin-top:2px;">${esc(fmtTokens(tk.tokensPerLineAdded))} per line added</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderModels() {
    const v = view();
    const sum = v.summary;
    const famColorVar = { opus: 'var(--purple)', sonnet: 'var(--blue)', haiku: 'var(--green)', fable: 'var(--pink)', codex: 'var(--cyan)', gpt: 'var(--amber)', 'o-series': 'var(--red)', unknown: 'var(--ink3)' };
    const fams = Object.keys(v.modelBreakdown).filter((k) => v.modelBreakdown[k].cost > 0).sort((a, b) => v.modelBreakdown[b].cost - v.modelBreakdown[a].cost);
    const famPcts = pctTo100(fams.map((fm) => v.modelBreakdown[fm].cost));
    const modelLegend = fams.map((fm, i) =>
      `<div style="display:flex;align-items:center;gap:8px;font-size:12px;">
        <span style="width:8px;height:8px;border-radius:3px;background:${famColorVar[fm] || 'var(--ink3)'};"></span>
        <span style="color:var(--ink2);flex:1;">${esc(famLabel(v.modelBreakdown, fm))}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink3);">${famPcts[i]}%</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;width:62px;text-align:right;">${esc(fmtMoney(v.modelBreakdown[fm].cost))}</span>
      </div>`).join('');

    const toolEntries = Object.entries(v.toolBreakdown).sort((a, b) => b[1] - a[1]).slice(0, 9);
    const toolMax = Math.max(1, ...toolEntries.map(([, cnt]) => cnt));
    const toolRows = toolEntries.map(([name, cnt], i) =>
      `<div style="display:grid;grid-template-columns:92px 1fr 44px;align-items:center;gap:10px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</span>
        <div style="height:8px;border-radius:5px;background:var(--hover);overflow:hidden;">
          <div style="height:100%;width:${Math.round(cnt / toolMax * 100)}%;border-radius:5px;background:linear-gradient(90deg, color-mix(in srgb, var(--blue) 70%, transparent), var(--blue));transform-origin:left;animation:growX .9s cubic-bezier(0.22,1,0.36,1) both;animation-delay:${(i * 0.05).toFixed(2)}s;"></div>
        </div>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink3);text-align:right;">${cnt.toLocaleString()}</span>
      </div>`).join('');

    $('sec-models').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--accent);">03</span>
        <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;">Models &amp; Tools</h2>
        <div style="flex:1;height:1px;background:var(--line2);"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;">
        <div style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);">
          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Spend by Model</h3>
          <div style="height:190px;margin-top:14px;position:relative;">
            <canvas id="chart-models"></canvas>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
              <span style="font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;">${esc(fmtMoney(sum.totalCost))}</span>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.16em;color:var(--ink3);">TOTAL</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;margin-top:14px;">${modelLegend}</div>
        </div>
        <div style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);">
          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Cost per Commit</h3>
          <div style="height:250px;margin-top:14px;position:relative;"><canvas id="chart-model-efficiency"></canvas></div>
          <div style="font-size:11px;color:var(--ink3);margin-top:10px;line-height:1.5;">Lower is better — commit counts under each bar are the confidence signal.</div>
        </div>
        <div style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:20px 22px;box-shadow:var(--shadow);">
          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Tool Usage</h3>
          <div style="display:flex;flex-direction:column;gap:9px;margin-top:16px;">${toolRows}</div>
        </div>
      </div>`;
  }

  function renderAgents() {
    const v = view();
    const sum = v.summary, am = v.autonomyMetrics;

    // Faceoff
    const showFaceoff = state.source === 'all' && payloads.claude && payloads.codex;
    let faceoff = '';
    if (showFaceoff) {
      const A = payloads.claude, B = payloads.codex;
      const faceClaudeGrade = A.summary.overallGrade, faceCodexGrade = B.summary.overallGrade;
      const mk = (label, aVal, bVal, fmt, lowerBetter, max) => {
        // A metric is only comparable when both sides are real numbers; a null
        // (e.g. survivalRate before any lines have matured) must not "win" or
        // print as "null%".
        const cmp = aVal != null && bVal != null;
        const aWin = cmp && (lowerBetter ? aVal < bVal : aVal > bVal);
        const bWin = cmp && (lowerBetter ? bVal < aVal : bVal > aVal);
        const scale = (x) => x == null ? 6 : Math.max(6, Math.round((x / (max || Math.max(aVal, bVal, 1))) * 100));
        return `<div class="fo-row" style="display:grid;grid-template-columns:1fr 150px 1fr;align-items:center;gap:14px;">
          <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:${aWin ? 700 : 500};color:${aWin ? 'var(--ink)' : 'var(--ink3)'};">${esc(fmt(aVal))}</span>
            <div style="flex:0 0 42%;height:9px;border-radius:5px;background:var(--hover);overflow:hidden;display:flex;justify-content:flex-end;">
              <div style="height:100%;width:${scale(aVal)}%;border-radius:5px;background:#D97757;transform-origin:right;animation:growX .9s cubic-bezier(0.22,1,0.36,1) both;"></div>
            </div>
          </div>
          <div style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);">${esc(label)}</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="flex:0 0 42%;height:9px;border-radius:5px;background:var(--hover);overflow:hidden;">
              <div style="height:100%;width:${scale(bVal)}%;border-radius:5px;background:var(--cyan);transform-origin:left;animation:growX .9s cubic-bezier(0.22,1,0.36,1) both;"></div>
            </div>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:${bWin ? 700 : 500};color:${bWin ? 'var(--ink)' : 'var(--ink3)'};">${esc(fmt(bVal))}</span>
          </div>
        </div>`;
      };
      const pct = (x) => x == null ? '—' : x + '%';
      const rows = [
        mk('Spend', A.summary.totalCost, B.summary.totalCost, (x) => fmtMoney(x), true),
        mk('Sessions', A.summary.totalSessions, B.summary.totalSessions, (x) => String(x), false),
        mk('Commits', A.summary.totalCommits, B.summary.totalCommits, (x) => String(x), false),
        mk('$ / Commit', A.summary.avgCostPerCommit, B.summary.avgCostPerCommit, (x) => fmtMoney(x), true),
        mk('Line Survival', A.lineSurvival.survivalRate, B.lineSurvival.survivalRate, pct, false, 100),
      ].join('');
      faceoff = `<div class="faceoff-section faceoff-card" style="border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:22px 26px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden;">
        ${clawdSvg('data-agent-mascot="claude" style="position:absolute;left:-18px;bottom:-34px;opacity:0.05;transform:rotate(-7deg);pointer-events:none;"', 150, 'var(--card)')}
        <svg viewBox="0 0 24 24" width="140" height="140" fill="var(--ink)" data-agent-logo="codex" style="position:absolute;right:-20px;bottom:-34px;opacity:0.04;pointer-events:none;"><path d="${MARKS.codex}"></path></svg>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;position:relative;">
          <div style="display:flex;align-items:center;gap:10px;">
            ${clawdSvg('data-agent-mascot="claude" role="img" aria-label="Claude" style="flex-shrink:0;"', 22, '#141413')}
            <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;">Claude Code</span>
            <span class="grade-badge" style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;color:${gradeColor(faceClaudeGrade)};background:${gradeBg(faceClaudeGrade)};">${esc(faceClaudeGrade)}</span>
          </div>
          <span class="faceoff-vs" style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.18em;color:var(--ink3);border:1px solid var(--line);border-radius:999px;padding:5px 13px;">VS</span>
          <div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">
            <span class="grade-badge" style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;color:${gradeColor(faceCodexGrade)};background:${gradeBg(faceCodexGrade)};">${esc(faceCodexGrade)}</span>
            <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;">OpenAI Codex</span>
            ${logoSvg('codex', 19, 'var(--ink)', 'role="img" aria-label="OpenAI Codex" style="flex-shrink:0;"')}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:13px;margin-top:20px;">${rows}</div>
      </div>`;
    }

    // Autonomy hub
    const autoColor = gradeColor(am.overall.grade);
    const ringC = 345.6;
    const autoOffset = (ringC - ringC * am.overall.score / 100).toFixed(1);
    const bd = am.breakdown;
    const [bA, bH, bV] = pctTo100([bd.autopilotScore * 0.30, bd.selfHealWeighted * 0.35, bd.velocityScore * 0.35]);
    const autoBreak = [
      [bA, 'var(--cyan)', 'Autopilot'], [bH, 'var(--green)', 'Self-Heal'], [bV, 'var(--blue)', 'Velocity'],
    ];
    const autoBars = autoBreak.map(([w, c, lbl]) => `<div title="${esc(lbl)} contributes ${w}%" style="width:${w}%;background:${c};"></div>`).join('');
    const autoLegend = autoBreak.map(([w, c, lbl]) => `<span style="display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--ink3);"><span style="width:7px;height:7px;border-radius:2px;background:${c};"></span>${esc(lbl)} ${w}%</span>`).join('');

    const autoHub = `<div style="flex:1 1 280px;border:1px solid var(--line2);border-radius:16px;background:var(--card);padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:var(--shadow);">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);">Autonomy Score</div>
      <div style="position:relative;width:130px;height:130px;margin-top:16px;">
        <svg viewBox="0 0 130 130" width="130" height="130" style="transform:rotate(-90deg);">
          <circle cx="65" cy="65" r="55" fill="none" stroke="var(--hover)" stroke-width="9"></circle>
          <circle cx="65" cy="65" r="55" fill="none" stroke="${autoColor}" stroke-width="9" stroke-linecap="round" stroke-dasharray="345.6" stroke-dashoffset="${autoOffset}" style="--c:345.6;--o:${autoOffset};animation:ringIn 1.2s .2s cubic-bezier(0.22,1,0.36,1) both;"></circle>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:40px;font-weight:700;color:${autoColor};">${esc(am.overall.grade)}</div>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;margin-top:14px;">${am.overall.score} / 100</div>
      <div style="font-size:12px;color:var(--ink2);margin-top:8px;line-height:1.55;">How independently the agent works — actions per prompt, self-verification, and steps per commit.</div>
      <div style="display:flex;height:8px;border-radius:5px;overflow:hidden;gap:2px;margin-top:18px;width:100%;">${autoBars}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:9px;justify-content:center;">${autoLegend}</div>
    </div>`;

    const autoMetricDefs = [
      { name: 'Autopilot Ratio', value: am.autopilotRatio + '×', unit: 'per prompt', color: 'var(--cyan)', pct: Math.min(am.autopilotRatio / 5 * 100, 100) + '%', sub: am.autopilotRatio >= 4 ? 'High autonomy' : am.autopilotRatio >= 2 ? 'Moderate — agent works in bursts' : 'Low — needs frequent prompting' },
      { name: 'Self-Heal Score', value: am.selfHealScore + '%', unit: 'verified', color: 'var(--green)', pct: am.selfHealScore + '%', sub: `${am.totalVerificationCalls} of ${am.attemptedBashCalls} shell calls were tests / lints` },
      { name: 'Commit Velocity', value: am.commitVelocity !== null ? String(am.commitVelocity) : '—', unit: 'steps / commit', color: 'var(--blue)', pct: (am.commitVelocity !== null ? Math.max(0, 100 - am.commitVelocity) : 0) + '%', sub: am.commitVelocity !== null ? (am.commitVelocity <= 20 ? 'Blazing' : am.commitVelocity <= 50 ? 'Solid' : 'Heavy') : 'No commits yet' },
    ];
    const autoMetrics = autoMetricDefs.map((m) => `<div style="border:1px solid var(--line2);border-radius:14px;background:var(--card);padding:17px 18px;box-shadow:var(--shadow);">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);">${esc(m.name)}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:25px;font-weight:700;color:${m.color};margin-top:8px;">${esc(m.value)}<span style="font-size:11px;font-weight:500;color:var(--ink3);margin-left:5px;">${esc(m.unit)}</span></div>
      <div style="height:7px;border-radius:4px;background:var(--hover);overflow:hidden;margin-top:11px;">
        <div style="height:100%;width:${m.pct};border-radius:4px;background:${m.color};transform-origin:left;animation:growX 1s .3s cubic-bezier(0.22,1,0.36,1) both;"></div>
      </div>
      <div style="font-size:11px;color:var(--ink2);margin-top:8px;line-height:1.5;">${esc(m.sub)}</div>
    </div>`).join('');

    // Attribution
    const r = sum.reconciliation;
    const bc = r.commits.byConfidence;
    const attribDefs = [
      ['High-confidence AI', bc.high, 'var(--green)'], ['Medium', bc.medium, 'var(--amber)'],
      ['Low-confidence', bc.low, 'var(--red)'], ['Organic (manual)', r.commits.organic, 'var(--ink3)'],
    ].filter(([, val]) => val > 0);
    const attribPcts = pctTo100(attribDefs.map(([, val]) => val));
    const attribSegs = attribDefs.map(([label, val, color], i) =>
      `<div title="${esc(label)}: ${val} commits" style="width:${attribPcts[i]}%;background:${color};transform-origin:left;animation:growX .9s cubic-bezier(0.22,1,0.36,1) both;"></div>`).join('');
    const attribLegend = attribDefs.map(([label, val, color], i) =>
      `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);"><span style="width:8px;height:8px;border-radius:3px;background:${color};"></span>${esc(label)} ${val} (${attribPcts[i]}%)</span>`).join('');
    const ts = r.commits.trailerStamped || { matched: 0, crossAgent: 0, organic: 0 };
    const tsTotal = ts.matched + ts.crossAgent + ts.organic;
    const trailerNote = `${tsTotal} commits carry an agent Co-authored-by trailer — ${ts.matched} confirmed against session logs${ts.crossAgent ? `, ${ts.crossAgent} claimed by the other agent` : ''}${ts.organic ? `, ${ts.organic} with no session in window` : ''}.`;
    const cmdChips = (am.topVerificationCommands || []).map((x) =>
      `<span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink2);border:1px solid var(--line2);background:var(--bg2);border-radius:7px;padding:4px 9px;">${esc(x.command)} <span style="color:var(--green);font-weight:600;">×${x.count}</span></span>`).join('');

    const attribution = `<div style="border:1px solid var(--line2);border-radius:14px;background:var(--card);padding:18px 20px;box-shadow:var(--shadow);">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Attribution &amp; Coverage</h3>
        <span style="font-size:11px;color:var(--ink3);">${r.commits.aiMatched + r.commits.organic} commits in window</span>
      </div>
      <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;gap:2px;margin-top:13px;">${attribSegs}</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px 16px;margin-top:10px;">${attribLegend}</div>
      <div style="font-size:11.5px;color:var(--ink2);margin-top:12px;border-top:1px dashed var(--line);padding-top:11px;"><span style="color:var(--green);">◆</span> ${esc(trailerNote)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;">${cmdChips}</div>
    </div>`;

    $('sec-agents').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--accent);">04</span>

  function renderRhythm() {

    heat.forEach((row, d) => row.forEach((val, h) => { if (val > peak.v) peak = { v: val, d, h }; }));
    const heatRows = heat.map((row, d) => {
      const cells = row.map((val, h) => {
        const bg = val === 0 ? 'var(--hover)' : `color-mix(in srgb, var(--green) ${Math.round(20 + (val / maxHeat) * 80)}%, var(--hover))`;
        return `<div class="heat-cell" title="${dayLabels[d]} ${h}:00 — ${val} commit${val === 1 ? '' : 's'}" style="aspect-ratio:1;border-radius:3px;background:${bg};cursor:default;"></div>`;

  // ── Skills & MCP ──
  function rankedBarRows(entries, max, colorVar, emptyText) {

    return entries.map(([name, cnt], i) => `<div style="display:grid;grid-template-columns:1fr 1fr 44px;align-items:center;gap:10px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(name)}">${esc(name)}</span>
      <div style="height:8px;border-radius:5px;background:var(--hover);overflow:hidden;">
        <div style="height:100%;width:${Math.round(cnt / max * 100)}%;border-radius:5px;background:linear-gradient(90deg, color-mix(in srgb, ${colorVar} 70%, transparent), ${colorVar});transform-origin:left;animation:growX .9s cubic-bezier(0.22,1,0.36,1) both;animation-delay:${(i * 0.05).toFixed(2)}s;"></div>
      </div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink3);text-align:right;">${cnt.toLocaleString()}</span>
    </div>`).join('');
  }

    const v = view();

    const adoptionDefs = v.featureAdoption || [];
    const adoptionRows = adoptionDefs.length ? adoptionDefs.map((f, i) => `<div style="display:grid;grid-template-columns:1fr 1fr 84px;align-items:center;gap:10px;">

      <span style="font-size:12px;color:var(--ink2);">${esc(clientLabel(name))}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;">${n} <span style="color:var(--ink3);font-weight:500;">(${Math.round(n / clientTotal * 100)}%)</span></span>
    </div>`).join('') : `<div style="font-size:12px;color:var(--ink3);">No sessions yet.</div>`;

      `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;border-radius:9px;background:var(--bg2);">
        <span style="font-size:12px;color:var(--ink2);">${esc(label)}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;">${d.sessions} <span style="color:var(--ink3);font-weight:500;">(${d.pct}%)</span></span>
      </div>`).join('');

    $('sec-skills').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--accent);">06</span>
        <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;">Skills &amp; MCP</h2>
        <div style="flex:1;height:1px;background:var(--line2);"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;">

          <h3 style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink2);margin:0;">Top Skills</h3>
