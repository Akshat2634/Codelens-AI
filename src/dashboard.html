  // ── Sessions table (re-renders on its own state; charts untouched) ──
  const confColors = { high: 'var(--green)', medium: 'var(--amber-hi)', low: 'var(--red)' };
  function sessionList() {
    const v = view();
    let list = v.sessions;
    if (state.filter === 'shipped') list = list.filter((x) => x.commitCount > 0);
    if (state.filter === 'leaked') list = list.filter((x) => x.commitCount === 0);
    if (state.q.trim()) {
      const q = state.q.trim().toLowerCase();
      list = list.filter((x) =>
        (x.projectName || '').toLowerCase().includes(q) ||
        fmtModel(x.model).toLowerCase().includes(q) ||
        x.commits.some((cm) => cm.subject.toLowerCase().includes(q)));
    }
    const sortVal = (x) => {
      const col = state.sortCol;
      if (col === 'cost') return x.cost.totalCost;
      if (col === 'msgs') return x.userMessageCount + x.assistantMessageCount;
      if (col === 'model') return fmtModel(x.model);
      if (col === 'startTime') return new Date(x.startTime).getTime();
      return x[col] ?? 0;
    };
    return [...list].sort((a, b) => {
      const av = sortVal(a), bv = sortVal(b);
      if (typeof av === 'string') return state.sortDir * av.localeCompare(bv);
      return state.sortDir * (av - bv);
    });
  }

  function renderSessions() {
    const v = view();
    const list = sessionList();
    const pageSize = 10;
    const pageCount = Math.max(1, Math.ceil(list.length / pageSize));
    const page = Math.min(state.page, pageCount);
    const pageRows = list.slice((page - 1) * pageSize, page * pageSize);

    const headerDefs = [
      ['startTime', 'Date', 'left'], ['projectName', 'Project', 'left'], ['model', 'Model', 'left'],
      ['msgs', 'Msgs', 'right'], ['autopilotRatio', 'Auto', 'right'], ['cost', 'Cost', 'right'],
      ['commitCount', 'Commits', 'right'], ['linesAdded', 'Lines', 'right'], [null, 'Grade', 'center'],
    ];
    const headers = headerDefs.map(([key, label, align]) => {
      const arrow = key === state.sortCol ? (state.sortDir === 1 ? ' ↑' : ' ↓') : '';
      const color = key === state.sortCol ? 'var(--ink)' : 'var(--ink3)';
      return `<button ${key ? `data-act="sort" data-arg="${key}"` : 'disabled'} title="${key ? 'Sort by ' + esc(label) : ''}" style="border:0;background:transparent;cursor:${key ? 'pointer' : 'default'};text-align:${align};font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:${color};padding:2px 0;">${esc(label)}${arrow}</button>`;
    }).join('');

    const gridCols = '168px 1.1fr 1.15fr 64px 74px 84px 86px 110px 62px';
    const rows = pageRows.map((x) => {
      const expanded = state.expanded === x.sessionId;
      // Only Codex sessions carry a `source` field; Claude sessions omit it
      // (the pipeline's convention is `s.source || 'claude'`), so anything that
      // isn't explicitly 'codex' is Claude.
      const isCodex = x.source === 'codex';
      const srcColor = isCodex ? 'var(--cyan)' : '#D97757';
      const srcLabel = isCodex ? 'OpenAI Codex' : 'Claude Code';
      const date = new Date(x.startTime).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      const confColor = x.commitCount ? (confColors[x.attributionConfidence] || 'var(--ink3)') : 'transparent';
      const confLabel = x.attributionConfidence ? x.attributionConfidence + ' attribution confidence' : '';
      let expandBlock = '';
      if (expanded) {
        const commitRows = x.commits.map((cm) => {
          const branchColor = cm.onMain ? 'var(--green)' : 'var(--ink3)';
          const branchBg = cm.onMain ? 'color-mix(in srgb, var(--green) 12%, transparent)' : 'var(--hover)';
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line2);font-size:12px;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber-hi);">${esc(cm.hash)}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:5px;color:${branchColor};background:${branchBg};">${cm.onMain ? 'main' : 'branch'}</span>
            ${cm.aiTrailer ? '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:9.5px;color:var(--green);" title="Carries an agent Co-authored-by trailer">✓ AI-stamped</span>' : ''}
            <span style="color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cm.subject)}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink3);white-space:nowrap;">+${(cm.totalAdded || 0).toLocaleString()}/−${(cm.totalDeleted || 0).toLocaleString()}</span>
          </div>`;
        }).join('');
        const noCommits = x.commits.length === 0 ? `<div style="padding:8px 0;font-size:12px;color:var(--ink3);">No matched commits — this session's spend is part of the value leak.</div>` : '';
        expandBlock = `<div class="expand-row" style="padding:6px 18px 14px 44px;border-bottom:1px solid var(--line2);background:var(--bg2);animation:riseSm .25s ease both;">${commitRows}${noCommits}</div>`;
      }
      return `<div>
        <div class="session-row${expanded ? ' expanded' : ''}" data-act="rowToggle" data-arg="${esc(x.sessionId)}" style="display:grid;grid-template-columns:${gridCols};align-items:center;padding:11px 18px;border-bottom:1px solid var(--line2);cursor:pointer;${expanded ? 'background:var(--bg2);' : ''}opacity:${x.isOrphaned ? 0.62 : 1};">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);transform:rotate(${expanded ? '90deg' : '0deg'});transition:transform .2s;display:inline-block;">▶</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink2);">${esc(date)}</span>
          </div>
          <span style="font-size:13.5px;font-weight:500;">${esc(x.projectName || '—')}</span>
          <div style="display:flex;align-items:center;gap:7px;">
            <span title="${esc(srcLabel)}" style="display:inline-flex;flex-shrink:0;">${logoSvg(isCodex ? 'codex' : 'claude', 12, srcColor, 'style="display:block"')}</span>
            <span style="font-size:13px;color:var(--ink2);">${esc(fmtModel(x.model))}</span>
          </div>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink2);text-align:right;padding-right:14px;">${x.userMessageCount + x.assistantMessageCount}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--cyan);text-align:right;padding-right:14px;">${x.autopilotRatio > 0 ? x.autopilotRatio + '×' : '—'}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;text-align:right;padding-right:14px;">${esc(fmtMoney(x.cost.totalCost))}</span>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;padding-right:14px;">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;">${x.commitCount}</span>
            <span style="width:7px;height:7px;border-radius:50%;background:${confColor};" title="${esc(confLabel)}"></span>
          </div>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;padding-right:14px;"><span style="color:var(--green);">+${x.linesAdded.toLocaleString()}</span> <span style="color:var(--ink3);">/</span> <span style="color:var(--red);">−${x.linesDeleted.toLocaleString()}</span></span>
          <span style="display:inline-flex;justify-content:center;"><span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;color:${gradeColor(x.grade)};background:${gradeBg(x.grade)};">${esc(x.grade)}</span></span>
        </div>
        ${expandBlock}
      </div>`;
    }).join('');

    const filterChips = [['all', 'All'], ['shipped', 'Shipped'], ['leaked', 'No commits']].map(([key, label]) =>
      `<button data-act="filter" data-arg="${key}" style="border:0;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.05em;padding:5px 12px;border-radius:7px;color:${state.filter === key ? 'var(--ink)' : 'var(--ink3)'};background:${state.filter === key ? 'var(--hover)' : 'transparent'};transition:color .15s,background .15s;">${esc(label)}</button>`).join('');

    $('sec-sessions').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--accent);">07</span>
        <h2 style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0;">Sessions</h2>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink3);">${list.length} of ${v.sessions.length}</span>
        <div style="flex:1;height:1px;background:var(--line2);min-width:20px;"></div>
      </div>
      <div style="border:1px solid var(--line2);border-radius:16px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;">
        <div style="display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line2);flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:220px;border:1px solid var(--line2);background:var(--bg2);border-radius:9px;padding:7px 12px;">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--ink3)" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
            <input id="session-search" value="${esc(state.q)}" placeholder="Search project, model, commit…" style="flex:1;border:0;outline:none;background:transparent;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:12px;">
          </div>
          <div style="display:flex;gap:4px;border:1px solid var(--line2);border-radius:9px;padding:3px;background:var(--bg2);">${filterChips}</div>
        </div>
        <div style="overflow-x:auto;overflow-y:hidden;">
          <div style="min-width:960px;">
            <div style="display:grid;grid-template-columns:${gridCols};gap:0;padding:10px 18px;border-bottom:1px solid var(--line2);background:var(--bg2);">${headers}</div>
            ${rows}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:13px 18px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink3);">Page ${page} / ${pageCount}</span>
          <div style="flex:1;"></div>
          <button data-act="prevPage" style="border:1px solid var(--line2);background:var(--bg2);color:${page > 1 ? 'var(--ink2)' : 'var(--ink3)'};cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;padding:6px 14px;border-radius:8px;">← Prev</button>
          <button data-act="nextPage" style="border:1px solid var(--line2);background:var(--bg2);color:${page < pageCount ? 'var(--ink2)' : 'var(--ink3)'};cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;padding:6px 14px;border-radius:8px;">Next →</button>
        </div>
      </div>
      <footer style="text-align:center;padding:52px 0 0;font-size:12.5px;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:9px;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--amber);">Designed &amp; built in the Bay Area · California <span style="color:var(--amber-hi);">◆</span></div>
        <div style="color:var(--ink2);font-size:13px;">
          Made by <a href="https://www.linkedin.com/in/akshat2634/" class="footer-link" style="color:var(--blue);text-decoration:none;">Akshat</a>
          <span style="color:var(--ink3);">·</span> Powered by <a href="https://code.claude.com/docs/en/overview" class="footer-link" style="color:var(--blue);text-decoration:none;">Claude Code</a>
          <span style="color:var(--ink3);">·</span> <a href="https://github.com/Akshat2634/Codelens-AI" class="footer-link" style="color:var(--blue);text-decoration:none;">GitHub</a>
          <span style="color:var(--ink3);">·</span> <a href="https://codelensai-dev.vercel.app/" class="footer-link" style="color:var(--blue);text-decoration:none;">Website</a>
        </div>
        <div style="color:var(--ink3);">Open source — contributions, ideas, and feedback welcome! <a href="https://github.com/Akshat2634/Codelens-AI" class="footer-link" style="color:var(--blue);text-decoration:none;">Star the repo</a> if you find it useful.</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:3px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);">Supports</span>
          <span style="display:inline-flex;align-items:center;gap:7px;color:var(--ink2);font-size:12.5px;">${logoSvg('claude', 13, '#D97757', 'style="display:block"')}Claude Code</span>
          <span style="display:inline-flex;align-items:center;gap:7px;color:var(--ink2);font-size:12.5px;">${logoSvg('codex', 13, 'var(--ink2)', 'style="display:block"')}OpenAI Codex</span>
        </div>
        <div style="font-size:11px;color:var(--ink3);opacity:0.75;max-width:720px;line-height:1.6;text-wrap:pretty;">Cost estimates are approximate — based on Anthropic's and OpenAI's published per-token API pricing and may vary from actual billing (subscription plans pay a flat fee). Cursor, Gemini CLI, and more coming soon. All data stays local.</div>
      </footer>`;
  }

  // ── Command palette ──
  function computeCmdItems() {
    const v = view();
    const navDefs = [['sec-overview', 'Overview'], ['sec-flow', 'Cost & Tokens'], ['sec-models', 'Models & Tools'], ['sec-agents', 'Agents'], ['sec-rhythm', 'Rhythm'], ['sec-skills', 'Skills & MCP'], ['sec-sessions', 'Sessions']];
    const goTo = (id) => {
      state.cmdOpen = false; renderCmd();
      const el = $(id);
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 16, behavior: 'smooth' });
    };
    const srcColors = { claude: '#D97757', codex: 'var(--cyan)' };
    const all = [
      ...navDefs.map(([id, label]) => ({ icon: '→', iconColor: 'var(--accent)', label: 'Go to ' + label, hint: 'Section', runNow: () => goTo(id) })),
      { icon: '◉', iconColor: 'var(--purple)', label: 'View: All Agents', hint: 'Agent', runNow: () => { state.cmdOpen = false; switchSource('all'); } },
      { icon: '◉', iconColor: '#D97757', label: 'View: Claude Code', hint: 'Agent', runNow: () => { state.cmdOpen = false; switchSource('claude'); } },
      { icon: '◉', iconColor: 'var(--cyan)', label: 'View: OpenAI Codex', hint: 'Agent', runNow: () => { state.cmdOpen = false; switchSource('codex'); } },
      { icon: '◑', iconColor: 'var(--amber-hi)', label: 'Toggle light / dark theme', hint: 'Theme', runNow: () => { state.cmdOpen = false; renderCmd(); toggleThemeAt(window.innerWidth / 2, window.innerHeight / 3); } },
      { icon: '⇪', iconColor: 'var(--amber-hi)', label: 'Share AI report card', hint: 'Action', runNow: () => { state.cmdOpen = false; renderCmd(); openShare(); } },
      { icon: '↻', iconColor: 'var(--green)', label: 'Refresh dashboard data', hint: 'Action', runNow: () => { state.cmdOpen = false; renderCmd(); refreshData(); } },
      ...[7, 14, 30].map((rr) => ({ icon: '▤', iconColor: 'var(--blue)', label: `Chart range: last ${rr} days`, hint: 'Range', runNow: () => { state.range = rr; state.cmdOpen = false; renderFlow(); renderCmd(); scheduleCharts(['timeline', 'burn']); } })),
      ...v.sessions.slice(0, 40).map((x) => ({
        icon: '⌁', iconColor: x.source === 'codex' ? srcColors.codex : srcColors.claude,
        label: `${x.projectName} · ${fmtModel(x.model)} · ${fmtMoney(x.cost.totalCost)}`,
        hint: 'Session', searchOnly: true,
        runNow: () => {
          state.cmdOpen = false; state.q = ''; state.filter = 'all'; state.expanded = x.sessionId;
          state.page = 1; state.sortCol = 'startTime'; state.sortDir = -1;
          renderSessions(); renderCmd(); goTo('sec-sessions');
        },
      })),
    ];
    const cq = state.cmdQuery.trim().toLowerCase();
    // No query: show the full launcher (sections + all three agent Views +
    // actions + ranges) — it's a small fixed set and the palette scrolls, so
    // nothing gets cut (a 9-row cap previously hid "View: OpenAI Codex" et al.).
    // With a query, cap to the top matches so search stays tight.
    if (!cq) return all.filter((c) => !c.searchOnly);
    return all.filter((c) => c.label.toLowerCase().includes(cq)).slice(0, 9);
  }

  function renderCmd() {
    if (!state.cmdOpen) { $('cmd-root').innerHTML = ''; return; }
    const items = computeCmdItems();
    lastCmdItems = items;
    if (state.cmdIdx >= items.length) state.cmdIdx = Math.max(0, items.length - 1);
    const rows = items.map((ci, i) =>
      `<button data-act="cmdRun" data-arg="${i}" data-hover="${i}" style="display:flex;align-items:center;gap:11px;width:100%;border:0;text-align:left;cursor:pointer;padding:10px 12px;border-radius:10px;background:${i === state.cmdIdx ? 'var(--hover)' : 'transparent'};color:var(--ink);transition:background .1s;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;width:20px;text-align:center;color:${ci.iconColor};">${ci.icon}</span>
        <span style="flex:1;font-size:13.5px;">${esc(ci.label)}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);">${esc(ci.hint)}</span>
      </button>`).join('');
    const empty = items.length === 0 ? `<div style="padding:22px;text-align:center;font-size:12.5px;color:var(--ink3);">Nothing matches “${esc(state.cmdQuery)}”</div>` : '';
    $('cmd-root').innerHTML = `<div class="command-palette" data-act="closeCmd" style="position:fixed;inset:0;z-index:200;background:var(--scrim);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;">
      <div data-act="cmdStop" style="width:560px;max-width:calc(100vw - 48px);border:1px solid var(--glass-line);border-radius:16px;background:var(--glass);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);box-shadow:0 32px 80px -20px rgba(0,0,0,0.6);overflow:hidden;animation:popIn .22s cubic-bezier(0.22,1,0.36,1) both;">
        <div style="display:flex;align-items:center;gap:11px;padding:15px 18px;border-bottom:1px solid var(--glass-line);">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <input id="cmd-input" value="${esc(state.cmdQuery)}" placeholder="Jump to, switch agent, search sessions…" style="flex:1;border:0;outline:none;background:transparent;color:var(--ink);font-family:'Instrument Sans',sans-serif;font-size:14.5px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--ink3);border:1px solid var(--glass-line);border-radius:5px;padding:2px 6px;">ESC</span>
        </div>
        <div style="max-height:340px;overflow-y:auto;padding:7px;">${rows}${empty}</div>
      </div>
    </div>`;
    requestAnimationFrame(() => { const el = $('cmd-input'); if (el) el.focus(); });
  }

  // ══════════════════════════════════════════════════════════════════
  //  ORCHESTRATION
  // ══════════════════════════════════════════════════════════════════
  function renderAll() {
    renderSidebar();
    renderTopbar();
    renderOverview();
    renderFlow();
    renderModels();
    renderAgents();
    renderRhythm();
    renderSkills();
    renderSessions();
    renderCmd();
    scheduleCharts();
    runTickers(document);
  }

  // Event delegation — clicks
  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-act]');
    if (!el) return;
    const act = el.getAttribute('data-act');
    const arg = el.getAttribute('data-arg');
    switch (act) {
      case 'source': switchSource(arg); break;
      case 'openCmd': state.cmdOpen = true; state.cmdQuery = ''; state.cmdIdx = 0; renderCmd(); break;
      case 'closeCmd': state.cmdOpen = false; renderCmd(); break;
      case 'cmdStop': e.stopPropagation(); break;
      case 'toggleTheme': toggleThemeAt(e.clientX || 40, e.clientY || (window.innerHeight - 60)); break;
      case 'openShare': openShare(); break;
      case 'closeShare': closeShare(); break;
      case 'shareStop': e.stopPropagation(); break;
      case 'openCli': openCli(); break;
      case 'closeCli': closeCli(); break;
      case 'cliStop': e.stopPropagation(); break;
      case 'copyCmd': copyText(el.getAttribute('data-cmd')); break;
      case 'shareTheme': setShareTheme(arg); break;
      case 'copyShare': copyShare(); break;
      case 'downloadShare': downloadShare(); break;
      case 'refreshData': refreshData(); break;
      // renderFlow() recreates BOTH flow canvases, so both charts must rebuild
      // even though only one toggle changed (a single-key rebuild would leave
      // the other canvas blank).
      case 'toggleLog': state.timelineLog = !state.timelineLog; renderFlow(); scheduleCharts(['timeline', 'burn']); break;
      case 'toggleBurn': state.burnSplit = !state.burnSplit; renderFlow(); scheduleCharts(['timeline', 'burn']); break;
      case 'range': state.range = parseInt(arg, 10); renderFlow(); scheduleCharts(['timeline', 'burn']); break;
      case 'filter': state.filter = arg; state.page = 1; renderSessions(); break;
      case 'sort':
        if (state.sortCol === arg) state.sortDir = -state.sortDir; else { state.sortCol = arg; state.sortDir = -1; }
        state.page = 1; renderSessions(); break;
      case 'rowToggle': state.expanded = state.expanded === arg ? null : arg; renderSessions(); break;
      case 'prevPage': state.page = Math.max(1, state.page - 1); renderSessions(); break;
      case 'nextPage': {
        const total = sessionList().length;
        const pageCount = Math.max(1, Math.ceil(total / 10));
        state.page = Math.min(state.page + 1, pageCount); renderSessions(); break;
      }
      case 'cmdRun': { const it = lastCmdItems[parseInt(arg, 10)]; if (it) it.runNow(); break; }
      default: break;
    }
  });

  // Hover in command palette — restyle rows in place. A full renderCmd() here
  // would destroy/recreate the hovered button, re-triggering mouseover on the
  // fresh element and looping into a flicker.
  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-hover]');
    if (!el) return;
    const i = parseInt(el.getAttribute('data-hover'), 10);
    if (state.cmdIdx === i) return;
    state.cmdIdx = i;
    el.parentElement.querySelectorAll('[data-hover]').forEach((row) => {
      row.style.background = parseInt(row.getAttribute('data-hover'), 10) === i ? 'var(--hover)' : 'transparent';
    });
  });

  // Card hover accent (stat tiles)
  document.addEventListener('mouseover', (e) => {
    const card = e.target.closest('.stat-card[data-hoverline]');
    if (!card) return;
    card.style.borderColor = card.getAttribute('data-hoverline');
    card.style.transform = 'translateY(-2px)';
  });
  document.addEventListener('mouseout', (e) => {
    const card = e.target.closest('.stat-card[data-hoverline]');
    if (!card) return;
    card.style.borderColor = 'var(--line2)';
    card.style.transform = 'translateY(0)';
  });

  // Inputs (search + command query) via delegation
  document.addEventListener('input', (e) => {
    // Re-rendering replaces the <input>, so capture the caret position on the
    // outgoing element and restore it on the fresh one (mid-string edits must
    // not jump the cursor to the end).
    const pos = e.target.selectionStart;
    const restore = (id) => {
      const el = $(id);
      if (!el) return;
      el.focus();
      try { el.setSelectionRange(pos, pos); } catch (err) { /* non-text input */ }
    };
    if (e.target.id === 'session-search') {
      state.q = e.target.value; state.page = 1;
      renderSessions();
      restore('session-search');
    } else if (e.target.id === 'cmd-input') {
      state.cmdQuery = e.target.value; state.cmdIdx = 0;
      renderCmd();
      restore('cmd-input');
    }
  });

  // Keyboard: ⌘K + palette navigation
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      state.cmdOpen = !state.cmdOpen; state.cmdQuery = ''; state.cmdIdx = 0;
      renderCmd();
      return;
    }
    if (e.key === 'Escape' && state.shareOpen) { closeShare(); return; }
    if (e.key === 'Escape' && state.cliOpen) { closeCli(); return; }
    if (!state.cmdOpen) return;
    if (e.key === 'Escape') { state.cmdOpen = false; renderCmd(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); state.cmdIdx = Math.min(state.cmdIdx + 1, lastCmdItems.length - 1); renderCmd(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); state.cmdIdx = Math.max(state.cmdIdx - 1, 0); renderCmd(); }
    else if (e.key === 'Enter') { e.preventDefault(); const it = lastCmdItems[state.cmdIdx]; if (it) it.runNow(); }
  });

  // Scroll-spy — updates only nav styling (never rebuilds charts)
  function setupSpy() {
    const ids = ['sec-overview', 'sec-flow', 'sec-models', 'sec-agents', 'sec-rhythm', 'sec-skills', 'sec-sessions'];
    const spy = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting && state.activeSection !== en.target.id) {
          state.activeSection = en.target.id;
          updateNavActive();
        }
      });
    }, { rootMargin: '-30% 0px -60% 0px' });
    ids.forEach((id) => { const el = $(id); if (el) spy.observe(el); });
  }

  // ── Boot ──
  function fetchPayload(src) {
    const url = '/api/all' + (src !== 'all' ? ('?source=' + src) : '');
    return fetch(url).then((r) => r.ok ? r.json() : null).catch(() => null);
  }
  function renderError(msg) {
    document.querySelector('.main-inner').innerHTML =
      `<div style="max-width:520px;margin:18vh auto 0;text-align:center;font-family:'Instrument Sans',sans-serif;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);">Dashboard error</div>
        <div style="font-size:16px;margin-top:10px;color:var(--ink);">${esc(msg)}</div>
        <div style="font-size:13px;margin-top:8px;color:var(--ink2);">Make sure Codelens AI found sessions in this window, then reload.</div>
      </div>`;
  }
  async function boot() {
    state.theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    let savedSource = null;
    try { savedSource = localStorage.getItem('codelens-mc-source'); } catch (e) { /* ignore */ }
    const [all, claude, codex] = await Promise.all([fetchPayload('all'), fetchPayload('claude'), fetchPayload('codex')]);
    if (!all || !all.meta) { renderError('Could not load dashboard data from /api/all.'); return; }
    payloads.all = all;
    payloads.claude = (claude && claude.meta && claude.meta.source === 'claude') ? claude : null;
    payloads.codex = (codex && codex.meta && codex.meta.source === 'codex') ? codex : null;
    state.source = (savedSource && payloads[savedSource]) ? savedSource : 'all';
    renderAll();
    setupSpy();
  }
  boot();
})();
</script>
